<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrot Adrress Converter</title>
    <script src="converter" defer></script>
</head>
<body>
    <main class="converter-container">
        <header>
        <h1>Address Converter</h1>
        <h2>By: Parrot. 🦜</h2>
        <p>This tool helps you to convert any format for APLIN/Quick 3PL Hardware Request from Onboarding Team!</p>
        </header>
        <div>
            <form id="converter-form">
            <label for="full-name">Full Name</label>
            <input type="text" id="full-name" placeholder="Roberto Cebrian"> <span title="First name Only">❓</span>
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" placeholder="Cebrian">
            <label for="phone-number">Phone</label>
            <input type="number" id="phone-number" placeholder="55 12 34 56 78"> <span title="Only 10 numbers, don't include Lada">❓</span>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@parrotsoftware.io"> 
            <label for="address">Address</label>
            <input type="text" id="address"> <span title="Address1,Adrress2,City,State,ZIP">❓</span>
            <label for="references">References</label>
            <input type="text" id="references"> <span title="This is optional">❓</span>
            <div>   
                <button id="convert-Button" type="button">Submit</button>
            </div> 
            </form>
            <section class="results-section">
                <div class="output-box">
                    <p>APLIN format:</p>
                    <output id="APLIN-format" name="Result APLIN">Nothing Here... yet</output>
                    <button type="button">📋</button>
                </div>
                <div class="output-box">
                    <p>QUICK  format:</p>
                    <output id="QUICK-format" name="Result Quick">Nothing Here... yet</output>
                    <button type="button">📋</button>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
