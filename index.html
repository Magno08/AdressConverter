<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrot Adrress Converter</title>
</head>
<body>
    <div>
    <h1>Address Converter</h1>
    <h2>By: Parrot. 🦜</h2>
    <p>This tool helps you to convert any format for APLIN/Quick 3PL Hardware Request from Onboarding Team!</p>
    </div>
    <div>
        <form id="converter-form">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" placeholder="Roberto Cebrian"> <span title="First and Last Name only">❓</span>
        <label for="phone-number">Phone</label>
        <input type="number" id="phone-number" placeholder="55 12 34 56 78"> <span title="Only 10 numbers, don't include Lada">❓</span>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@parrotsoftware.io"> 
        <label for="address">Address</label>
        <input type="text" id="address"> <span title="Address1,Adrress2,City,State,ZIP">❓</span>
        <label for="references">References</label>
        <input type="text" id="references"> <span title="This is optional">❓</span>
        <div>   
            <input type="button" value="Summit">
        </div> 
        </form>
        <section>
            <p>APLIN format:</p>
            <output name="Result APLIN"">Nothing Here... yet</output>
            <button type="button">📋</button>
            <p>QUICK  format:</p>
            <output name="Result Quick">Nothing Here... yet</output>
            <button type="button">📋</button>
        </section>

    </div>
</body>
</html>
