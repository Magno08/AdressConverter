<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parrot Adrress Converter</title>
    <script src="converter.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="converter-container">
      <header>
        <h1>Address Converter</h1>
        <h2>By: Parrot. 🦜</h2>
        <p>
          This tool helps you to convert any format for APLIN/Quick 3PL Hardware
          Request from Onboarding Team!
        </p>
      </header>
      <div>
        <form id="converter-form">
          <div class="form-row">
            <div class="input-group">
              <label for="Restaurant-Name">Restaurant Name</label>
              <input
                type="text"
                id="Restaurant-Name"
                placeholder="Parrot Cafe"
                required
              />
            </div>
            <div class="input-group">
              <label for="full-name">First Name</label>
              <input
                type="text"
                id="full-name"
                placeholder="Roberto"
                required
              />
            </div>
            <div class="input-group">
              <label for="last-name">Last Name</label>
              <input
                type="text"
                id="last-name"
                placeholder="Cebrian"
                required
              />
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                placeholder="you@parrotsoftware.io"
                required
              />
            </div>
            <div class="input-group">
              <label for="phone-number">Phone</label>
              <input
                type="tel"
                id="phone-number"
                placeholder="55 12 34 56 78"
                required
              />
            </div>
          </div>

          <div class="form-row full-width">
            <div class="input-group">
              <label for="address">Address</label>
              <input
                type="text"
                id="address"
                placeholder="Calle, Colonia, Ciudad, Estado, CP"
                required
              />
            </div>
          </div>

          <div class="form-row full-width">
            <div class="input-group">
              <label for="references">References</label>
              <input
                type="text"
                id="references"
                placeholder="Entre calles, color de fachada..."
              />
            </div>
          </div>

          <div class="button-container">
            <button id="convert-Button" type="button">Submit</button>
          </div>
        </form>
        <section class="results-section">
          <div class="output-box">
            <p>APLIN format:</p>
            <output id="APLIN-format" name="Result APLIN"
              >Nothing Here... yet</output
            >
            <button type="button" id="copy-aplin">📋</button>
          </div>
          <div class="output-box">
            <p>QUICK format:</p>
            <output id="QUICK-format" name="Result Quick"
              >Nothing Here... yet</output
            >
            <button type="button" id="copy-quick">📋</button>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
